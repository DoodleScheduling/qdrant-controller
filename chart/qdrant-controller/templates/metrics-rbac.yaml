{{- if .Values.kubeRBACProxy.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "qdrant-controller.fullname" . }}-metrics-reader
  labels:
    {{- include "qdrant-controller.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - "/metrics"
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "qdrant-controller.fullname" . }}-metrics
  labels:
    {{- include "qdrant-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "qdrant-controller.fullname" . }}-metrics-reader
subjects:
- kind: ServiceAccount
  name: {{ template "qdrant-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "qdrant-controller.fullname" . }}-proxy
  labels:
    {{- include "qdrant-controller.labels" . | nindent 4 }}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "qdrant-controller.fullname" . }}-proxy
  labels:
    {{- include "qdrant-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "qdrant-controller.fullname" . }}-proxy
subjects:
- kind: ServiceAccount
  name: {{ template "qdrant-controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
