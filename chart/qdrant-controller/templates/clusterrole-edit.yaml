{{- if .Values.clusterRBAC.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "qdrant-controller.fullname" . }}-edit
  labels:
    {{- include "qdrant-controller.labels" . | nindent 4 }}
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
  annotations:
    {{- toYaml .Values.annotations | nindent 4 }}
rules:
- apiGroups:
  - "qdrant.infra.doodle.com"
  resources:
  - qdrantclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - "qdrant.infra.doodle.com"
  resources:
  - qdrantclusters/status
  verbs:
  - get
{{- end }}
