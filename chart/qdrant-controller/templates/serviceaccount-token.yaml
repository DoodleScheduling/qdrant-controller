{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "qdrant-controller.serviceAccountName" . }}
  labels:
    {{- include "qdrant-controller.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: {{ template "qdrant-controller.serviceAccountName" . }}
type: kubernetes.io/service-account-token
{{- end -}}
