apiVersion: v1
kind: Secret
metadata:
  name: qdrant-cloud-api-key
  namespace: default
type: Opaque
stringData:
  # Replace with your actual Qdrant Cloud Management API key
  # Get it from: https://cloud.qdrant.io/accounts/<account-id>/settings/api-keys
  apiKey: "your-qdrant-cloud-management-api-key-here"
