---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: qdrantclusters.qdrant.infra.doodle.com
spec:
  group: qdrant.infra.doodle.com
  names:
    kind: QdrantCluster
    listKind: QdrantClusterList
    plural: qdrantclusters
    shortNames:
    - qc
    singular: qdrantcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.version
      name: Version
      type: string
    - jsonPath: .status.nodesUp
      name: Nodes
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: QdrantCluster is the Schema for the qdrantclusters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: QdrantClusterSpec defines the desired state of QdrantCluster
            properties:
              accountID:
                description: AccountID is the Qdrant Cloud account ID (UUID format)
                pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
                type: string
              additionalDiskGiB:
                description: AdditionalDiskGiB specifies additional disk space in
                  GiB beyond the package default
                format: int32
                type: integer
              autoCreateDatabaseKey:
                default: true
                description: AutoCreateDatabaseKey controls whether to automatically
                  create a database API key
                type: boolean
              cloudProvider:
                description: CloudProvider specifies the cloud provider
                enum:
                - aws
                - gcp
                - azure
                - hybrid
                type: string
              cloudRegion:
                description: CloudRegion specifies the cloud provider region (e.g.,
                  "us-east-1", "europe-west1")
                minLength: 1
                type: string
              configuration:
                description: Configuration allows advanced cluster configuration
                properties:
                  databaseConfiguration:
                    additionalProperties:
                      type: string
                    description: DatabaseConfiguration for Qdrant-specific settings
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels to apply to the cluster (max 10)
                    maxProperties: 10
                    type: object
                type: object
              connectionSecret:
                description: |-
                  ConnectionSecret specifies the name of the secret to create with connection details
                  If not specified, defaults to <cluster-name>-connection
                properties:
                  name:
                    type: string
                type: object
              databaseKeyConfig:
                description: DatabaseKeyConfig configures the auto-created database
                  API key
                properties:
                  expiresInDays:
                    default: 90
                    description: ExpiresInDays sets the expiration time in days, defaults
                      to 90
                    format: int32
                    maximum: 365
                    minimum: 1
                    type: integer
                  name:
                    description: Name of the database API key, defaults to "<cluster-name>-key"
                    type: string
                  scopes:
                    description: Scopes defines the permissions for the key (e.g.,
                      ["read", "write"])
                    items:
                      type: string
                    type: array
                type: object
              interval:
                default: 5m
                description: Interval is the reconciliation interval
                type: string
              nodeCount:
                default: 1
                description: NodeCount specifies the number of nodes in the cluster
                format: int32
                minimum: 1
                type: integer
              packageSelection:
                description: |-
                  PackageSelection defines how to select the package for cluster nodes
                  Either packageID or resourceRequirements must be specified
                properties:
                  packageID:
                    description: PackageID explicitly specifies the package UUID from
                      ListPackages API
                    type: string
                  resourceRequirements:
                    description: |-
                      ResourceRequirements specifies desired resources for automatic package selection
                      The controller will find the smallest package matching these requirements
                    properties:
                      cpu:
                        anyOf:
                        - type: integer
                        - type: string
                        description: CPU specifies minimum CPU (e.g., "2" for 2 vCPU,
                          "500m" for half a vCPU)
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      disk:
                        anyOf:
                        - type: integer
                        - type: string
                        description: Disk specifies minimum disk space (e.g., "32Gi",
                          "64Gi")
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      ram:
                        anyOf:
                        - type: integer
                        - type: string
                        description: RAM specifies minimum RAM (e.g., "8Gi", "16Gi")
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                type: object
              qdrantVersion:
                description: QdrantVersion specifies the Qdrant version (e.g., "v1.16.3"
                  or "latest")
                type: string
              secret:
                description: Secret reference containing the Qdrant Cloud Management
                  API key
                properties:
                  apiKeyKey:
                    type: string
                  name:
                    type: string
                required:
                - name
                type: object
              storageTier:
                allOf:
                - enum:
                  - cost-optimized
                  - balanced
                  - performance
                - enum:
                  - cost-optimized
                  - balanced
                  - performance
                default: cost-optimized
                description: StorageTier specifies the storage performance tier
                type: string
              suspend:
                description: Suspend will suspend the cluster when set to true
                type: boolean
            required:
            - accountID
            - cloudProvider
            - cloudRegion
            - nodeCount
            - packageSelection
            - secret
            type: object
          status:
            description: QdrantClusterStatus defines the observed state of QdrantCluster
            properties:
              clusterID:
                description: ClusterID is the Qdrant Cloud cluster ID (UUID)
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the cluster's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connectionSecret:
                description: ConnectionSecret is the name of the secret containing
                  connection details
                type: string
              databaseKeyID:
                description: DatabaseKeyID is the ID of the auto-created database
                  API key
                type: string
              endpoint:
                description: Endpoint contains the cluster connection information
                properties:
                  grpcPort:
                    description: GRPCPort is the gRPC API port (typically 6334)
                    format: int32
                    type: integer
                  restPort:
                    description: RESTPort is the REST API port (typically 6333)
                    format: int32
                    type: integer
                  url:
                    description: URL is the base URL without port (e.g., "https://abc123.eu-central-1.aws.cloud.qdrant.io")
                    type: string
                type: object
              nodesUp:
                description: NodesUp indicates the number of nodes currently running
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the last observed generation
                format: int64
                type: integer
              packageID:
                description: PackageID is the resolved package UUID being used
                type: string
              phase:
                description: Phase represents the current phase of the cluster
                type: string
              version:
                description: Version is the currently running Qdrant version
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
